<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    text-align: center;
    margin-bottom: 0.4rem;
    background: linear-gradient(90deg, #ff4444, #ff9900, #ffe600, #44cc66, #4499ff, #aa44ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tagline {
    color: #555;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 3.5rem;
  }
  .links {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 400px;
  }
  .links a {
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-decoration: none;
    padding: 1.1rem 0;
    border-bottom: 1px solid #222;
    color: #aaa;
    font-size: 1rem;
    font-weight: 400;
    transition: color 0.15s, padding-left 0.15s;
  }
  .links a:first-child { border-top: 1px solid #222; }
  .links a:hover { color: #ffe600; padding-left: 6px; }
  .links a:hover .arrow { color: #ffe600; }
  .arrow {
    color: #333;
    font-size: 1.1rem;
    transition: color 0.15s;
  }
</style>
</head>
<body>
  <h1>Süt Kutusu Oyunu</h1>
  <p class="tagline">Siteler</p>
  <nav class="links">
    <a href="https://sutkutusuoyunu.github.io/play/">
      <span>Play Süt Kutusu Oyunu 1</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://sutkutusuoyunu.github.io/downloads/">
      <span>Downloads</span>
      <span class="arrow">&#8594;</span>
    </a>
    <a href="https://sutkutusuoyunu.github.io/documentation/">
      <span>Documentation</span>
      <span class="arrow">&#8594;</span>
    </a>
  </nav>
</body>
</html>
