  <style>
    html { background: #444; font-family: sans-serif; }
    body, html { overscroll-behavior: none; }

    #canvas, #overlayDiv {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: 0 none;
    }
    #canvas { background: #000; }

    .visible { visibility: visible; opacity: 1.0; transition: opacity .1s linear; }
    .hidden  { visibility: hidden;  opacity: 0;   transition: visibility 0s .25s, opacity .25s linear; }

    #statusDiv, #inputDiv {
      background: rgba(0,0,0,0.75); width: 50%; margin: auto;

    #statusTextDiv { overflow: auto; max-height: 40vh; color: #ccc; font-size: 14px; }

    #inputText { width: 100%; font-size: 175%; padding: 5px; background: inherit; color: #eee; }
    #inputText:focus { color: #fff; }

    #ContextContainer { position: absolute; left: 0; top: 0; color: white; }
    #ContextContainer.shown { background: rgba(0,0,0,0.5); border-radius: 0 0 5px 0; }
    #ContextButton {
      text-decoration: none; color: lightgrey; font-size: xx-large;

      padding: 10px; opacity: .75;
    }
    #ContextButton:focus { outline: none; color: #fff; opacity: 1.0; }
    #ContextMenu a {
      text-decoration: none; color: lightgrey; background: #444;
      height: 48px; width: 250px; border-radius: 5px; border: 1px solid lightgrey;
      display: flex; align-items: center; justify-content: center;
      margin: 5px; opacity: 1.0;
    }
    #ContextMenu a:hover { background: #666; color: #fff; }

<body>

  <!--
    SPLASH OVERLAY
    Uses inline styles with !important so nothing Ren'Py injects can override it.
    renpy.js is only added to the page after the 15s timer completes.
  -->
  <div id="skt-splash" style="
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important;
    z-index: 2147483647 !important;
    background: #000 !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
  ">
    <img src="web-splash.jpg" alt="" style="
      max-width: 100% !important;
      max-height: calc(100vh - 10px) !important;
      object-fit: contain !important;
      display: block !important;
      pointer-events: none !important;
    ">
    <div style="
      position: absolute !important;
      bottom: 0 !important; left: 0 !important;
      width: 100% !important; height: 6px !important;
      background: rgba(255,255,255,0.2) !important;
    ">
      <div id="skt-bar" style="
        height: 100% !important;
        width: 0% !important;
        background: #fff !important;
      "></div>
    </div>
  </div>

  <script>
  // Runs before renpy-pre.js — captures the splash elements immediately.
  // renpy.js is NOT in the HTML; we inject it only after the timer ends.
  (function () {
    var DURATION = 15000;
    var splash = document.getElementById('skt-splash');
    var bar    = document.getElementById('skt-bar');
    var start  = null;
    var done   = false;

    function tick(ts) {
      if (done) return;
      if (!start) start = ts;
      var pct = Math.min((ts - start) / DURATION, 1);
      bar.style.setProperty('width', (pct * 100).toFixed(2) + '%', 'important');

      if (pct < 1) {
        requestAnimationFrame(tick);
      } else {
        done = true;
        finish();
      }
    }

    function finish() {
      // Hard-remove the splash — no fade, no CSS transition that could be cancelled
      splash.parentNode.removeChild(splash);

      // NOW load Ren'Py
      var s = document.createElement('script');
      s.async = true;
      s.src = 'renpy.js';
      document.body.appendChild(s);
    }

    // Safety net: if rAF somehow stalls (background tab throttling),
    // force-finish after DURATION + 2s
    setTimeout(function () {
      if (!done) { done = true; finish(); }
    }, DURATION + 2000);

    requestAnimationFrame(tick);
  })();
  </script>

  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  <div id="ContextContainer">
    <a id="ContextButton">&#8801;</a><br>
    <div id="ContextMenu" style="display:none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)"
             accept="application/zip" style="display:none">
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt','text/plain');">Download Log</a>
      <a href="https://www.renpy.org/" target="_blank">Powered by Ren'Py</a>
    </div>
  </div>

  <div id="statusDiv" class="hidden">
    <div id="statusTextDiv"></div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <script>
    window.gameZipURL = 'game.zip';
    if (navigator.serviceWorker && !navigator.serviceWorker.controller) {
      navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
    }
  </script>

  <script src="renpy-pre.js"></script>
  <!-- renpy.js is injected dynamically after the splash timer ends -->
